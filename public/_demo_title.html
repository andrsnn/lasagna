<!doctype html>
<html><head><meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box} html,body{width:100%;height:100%}
  body{background:#0c0b0a;background-image:radial-gradient(130% 100% at 50% 30%, #1c1916 0%, #0c0b0a 60%);
    display:flex;align-items:center;justify-content:center;
    font-family:"Iowan Old Style","Source Serif 4",Georgia,serif;color:#f4efe6;overflow:hidden}
  .wrap{text-align:center;transform:translateY(-2%)}
  .mark{width:74px;height:74px;border-radius:20px;background:#c8412d;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;box-shadow:0 12px 40px -6px rgba(200,65,45,0.6)}
  .mark svg{width:38px;height:38px}
  h1{font-size:88px;font-weight:600;letter-spacing:-0.02em;line-height:1;color:#f6f1e9;white-space:nowrap}
  .tag{margin-top:22px;font-style:italic;font-size:30px;color:#b8ad9b}
  .kicker{margin-top:40px;font-family:ui-sans-serif,-apple-system,"Inter",system-ui,sans-serif;text-transform:uppercase;letter-spacing:0.3em;font-size:13.5px;color:#8a8273;font-weight:600}
</style></head>
<body><div class="wrap">
  <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff7f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="m9 15-1-1"/><path d="m15 15 1-1"/><path d="M9 19c-2.8 0-5-2.2-5-5v-4a8 8 0 0 1 16 0v4c0 2.8-2.2 5-5 5Z"/><path d="m8 19-2 3"/><path d="m16 19 2 3"/></svg></div>
  <h1>Lasagna</h1>
  <div class="tag">a personal AI workspace</div>

</div></body></html>
